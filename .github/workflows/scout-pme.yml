name: Scout PME — Identifier cibles acquisition

on:
  schedule:
    # Every 3 days at 07:00 UTC (9h Paris heure d'été)
    - cron: '0 7 1,4,7,10,13,16,19,22,25,28 * *'
  workflow_dispatch:  # also triggerable manually from GitHub Actions tab

jobs:
  scout:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check required secrets
        run: |
          missing=()
          [ -z "$ANTHROPIC_API_KEY" ]           && missing+=("ANTHROPIC_API_KEY")
          [ -z "$GOOGLE_SERVICE_ACCOUNT_JSON" ] && missing+=("GOOGLE_SERVICE_ACCOUNT_JSON")
          [ -z "$GOOGLE_SHEET_ID" ]             && missing+=("GOOGLE_SHEET_ID")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "❌ Missing secrets: ${missing[*]}"
            echo "Go to repo Settings → Secrets and variables → Actions"
            exit 1
          fi
          echo "✓ All required secrets present"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}

      - name: Run PME Scout
        run: node scripts/scout-pme/index.mjs
        env:
          # AI
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Google Sheets
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          # Email (optional — same SMTP as the web app)
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          SCOUT_EMAIL_TO: ${{ secrets.SCOUT_EMAIL_TO }}
