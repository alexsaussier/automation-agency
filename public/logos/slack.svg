<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- Slack logo: four colored pinwheel shapes -->

  <!-- Top-left: green (rotated bar top) -->
  <rect x="10" y="6" width="8" height="18" rx="4" fill="#2EB67D"/>
  <!-- Top-left cap dot -->
  <rect x="6" y="16" width="8" height="8" rx="4" fill="#2EB67D"/>

  <!-- Top-right: yellow (rotated bar right) -->
  <rect x="30" y="10" width="18" height="8" rx="4" fill="#ECB22E"/>
  <!-- Top-right cap dot -->
  <rect x="30" y="6" width="8" height="8" rx="4" fill="#ECB22E"/>

  <!-- Bottom-right: red (rotated bar bottom) -->
  <rect x="30" y="24" width="8" height="18" rx="4" fill="#E01E5A"/>
  <!-- Bottom-right cap dot -->
  <rect x="34" y="24" width="8" height="8" rx="4" fill="#E01E5A"/>

  <!-- Bottom-left: blue (rotated bar left) -->
  <rect x="6" y="30" width="18" height="8" rx="4" fill="#36C5F0"/>
  <!-- Bottom-left cap dot -->
  <rect x="16" y="34" width="8" height="8" rx="4" fill="#36C5F0"/>
</svg>
